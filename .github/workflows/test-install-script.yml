name: Test Install Script

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test-install:
    name: Test Install on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14 # ARM64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Test install script
        run: |
          echo "Testing installation on ${{ matrix.os }}..."
          curl -fsSL https://raw.githubusercontent.com/911218sky/kiro-cli-auth/main/install.sh | sudo bash

      - name: Verify installation
        run: |
          echo "Verifying kiro-cli-auth installation..."
          kiro-cli-auth --version
          kiro-cli-auth --help

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          kiro-cli-auth test
